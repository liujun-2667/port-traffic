services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: port
      POSTGRES_PASSWORD: port
      POSTGRES_DB: porttraffic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U port -d porttraffic"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      CONFIG_PATH: /app/config/port.yaml
      DATABASE_URL: postgres://port:port@db:5432/porttraffic?sslmode=disable
      PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - ./backend/config:/app/config:ro

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  pgdata:
